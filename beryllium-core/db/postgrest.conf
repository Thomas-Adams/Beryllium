# PostgREST configuration for Beryl CMS
# This is an alternative to environment variables in docker-compose.
# Currently docker-compose.yml uses env vars, so this file is for reference.

db-uri = "postgres://beryl_admin:beryl_secret@postgres:5432/beryl"
db-schemas = "main"
db-anon-role = "beryl_anonymous"

jwt-secret = "dev-secret-change-in-production"

server-port = 3000

# Enable OpenAPI output
openapi-server-proxy-uri = "http://localhost:3000"
